<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50 dark:bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-Flight-Path</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-full flex items-center justify-center px-4">

    <!-- ========================= -->
    <!-- Login Card Container      -->
    <!-- ========================= -->
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8 space-y-6">

        <!-- ========================= -->
        <!-- Logo + Title Section      -->
        <!-- ========================= -->
        <header class="text-center space-y-2">
            <!-- Replace this with your real logo later -->
            <div class="w-14 h-14 bg-indigo-600 dark:bg-indigo-500 rounded-xl flex items-center justify-center text-white text-2xl font-bold mx-auto">
                PFPcode
            </div>

            <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">
                Login
            </h1>

            <h2 class="text-gray-500 dark:text-gray-400 text-sm">
                Company Title
            </h2>
        </header>

        <!-- ========================= -->
        <!-- Login Form Inputs         -->
        <!-- ========================= -->
        <div class="flex flex-col space-y-4">

            <!-- Email -->
            <div>
                <label for="login-email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                    Username
                </label>
                <input 
                    type="email" 
                    id="login-email" 
                    class="mt-1 w-full px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 outline-none"
                    placeholder="you@example.com"
                >
            </div>

            <!-- Password -->
            <div>
                <label for="login-password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                    Password
                </label>
                <input 
                    type="password" 
                    id="login-password" 
                    class="mt-1 w-full px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 outline-none"
                    placeholder="••••••••"
                >
            </div>
        </div>

        <!-- ========================= -->
        <!-- Login Button              -->
        <!-- ========================= -->
        <div>
            <button 
                type="submit" 
                class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition">
                Login
            </button>
        </div>

        <!-- ========================= -->
        <!-- Extra Links               -->
        <!-- ========================= -->
        <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400">
            <button class="hover:text-indigo-600 dark:hover:text-indigo-400">Forgot Username</button>
            <button class="hover:text-indigo-600 dark:hover:text-indigo-400">Forgot Password</button>
        </div>

        <!-- ========================= -->
        <!-- Zach Section (JS Logic)   -->
        <!-- ========================= -->
        <!-- Zach Section Start -->
        <!-- TODO: Add JS logic in login.js -->
        <!-- - Validate inputs -->
        <!-- - Fake login (no backend) -->
        <!-- - Redirect to landing.html -->
        <!-- Zach Section End -->

    </div>

    <script src="login.js"></script>
</body>
</html>
